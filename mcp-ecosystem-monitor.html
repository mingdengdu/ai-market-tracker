const months=["04","05","06","07","08","09","10","11","12","01","02","03"];
const monthLabels=months.map((m,i)=>i<9?`25.${m}`:`26.${m}`);

let curTier="all",curTab="cards";

function heatDots(h){
  let s='<div class="heat">';
  for(let i=0;i<5;i++){
    const cls=i<h?(h>=5?'f':h>=4?'h':'a'):'';
    s+=`<span class="${cls}"></span>`;
  }
  return s+'</div>';
}

function trendIcon(t){
  return t==='up'?'<span class="up">↑ 上升</span>':t==='down'?'<span class="down">↓ 下降</span>':'<span class="flat">→ 平稳</span>';
}

function rankBadge(i){
  const c=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
  return `<span class="${c}">${i+1}</span>`;
}

function openBar(v){
  const clr=v>=80?'var(--accent2)':v>=60?'var(--accent)':v>=40?'var(--accent3)':'var(--warn)';
  return `<div class="pbar"><div class="pfill" style="width:${v}%;background:${clr}"></div></div> ${v}%`;
}

function renderCards(){
  const el=document.getElementById('p-cards');
  const tiers=[{k:"t1",n:"T1 大厂 × MCP 平台"},{k:"t2",n:"T2 科技公司"},{k:"t3",n:"T3 新锐企业"}];
  let html='';
  tiers.forEach(tier=>{
    const items=D.filter(d=>d.t===tier.k&&(curTier==='all'||curTier===tier.k));
    if(items.length===0)return;
    html+=`<div class="stitle">${tier.n} <span class="badge">${items.length} 家</span></div><div class="grid">`;
    items.forEach((d,i)=>{
      html+=`<div class="card" data-tier="${d.t}" style="animation-delay:${i*0.05}s">
        <div class="card-h"><span class="name" style="color:${d.c}">${d.n}</span><span class="cnt">${d.cnt} 产品</span></div>
        <div class="card-b">
          <div style="margin-bottom:8px"><span class="ptag">📦 ${d.p}</span></div>
          <div>${d.ps.map(p=>'<span class="itag">'+p+'</span>').join('')}</div>
        </div>
        <div class="card-f">
          <span>发布: ${d.date}</span>
          ${heatDots(d.heat)}
          ${trendIcon(d.trend)}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

function renderTable(){
  const el=document.getElementById('p-table');
  const items=D.filter(d=>curTier==='all'||curTier===d.t).sort((a,b)=>b.cnt-a.cnt);
  let html='<div class="tw"><table><thead><tr>';
  html+='<th>排名</th><th>企业</th><th>MCP 平台</th><th>产品数</th><th>热度</th><th>趋势</th><th>发布日期</th><th>开放度</th></tr></thead><tbody>';
  items.forEach((d,i)=>{
    html+=`<tr><td>${rankBadge(i)}</td><td style="color:${d.c};font-weight:600">${d.n}</td><td>${d.p}</td><td style="font-weight:700">${d.cnt}</td>`;
    html+=`<td>${heatDots(d.heat)}</td><td>${trendIcon(d.trend)}</td><td>${d.date}</td><td>${openBar(d.open)}</td></tr>`;
  });
  html+='</tbody></table></div>';
  el.innerHTML=html;
}

  const el=document.getElementById('p-heatmap');

    d.hh.forEach(v=>html+=`<div class="hmc h${v}">${v||''}</div>`);

  html+='</div>';
  el.innerHTML=html;
}

function setTab(id,el){
  curTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
}

function setTier(tier,el){
  curTier=tier;
  document.querySelectorAll('.controls .btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(curTab==='cards')renderCards();
  else if(curTab==='table')renderTable();
  else if(curTab==='heatmap')renderHeatmap();
}

function doFilter(){
  const v=document.getElementById('si').value.toLowerCase();
  if(curTab==='cards'){
    document.querySelectorAll('.card').forEach(c=>{
      const show=v===''||c.textContent.toLowerCase().includes(v);
      c.style.display=show?'':'none';
    });
  }
}
