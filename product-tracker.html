        :root {
            --primary: #065A82;
            --secondary: #1C7293;
            --accent: #21295C;
            --light: #CADCFC;
            --white: #FFFFFF;
            --text: #333333;
            --bg-light: #f5f7fa;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: var(--bg-light);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--white);
            padding: 2rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--white);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        /* Language Switcher */
        .lang-switch {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            border-radius: 25px;
        }
        
        .lang-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--white);
            cursor: pointer;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        
        .lang-btn.active {
            background: var(--white);
            color: var(--primary);
        }
        
        .lang-btn:hover:not(.active) {
            background: rgba(255,255,255,0.2);
        }
        
        /* Main Content */
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--white);
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card.tencent { border-left: 4px solid #4472C4; }
        .stat-card.alibaba { border-left: 4px solid #ED7D31; }
        .stat-card.bytedance { border-left: 4px solid #70AD47; }
        .stat-card.global { border-left: 4px solid #636366; }
        
        .stat-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-desc {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.5rem;
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 10px 20px;
            border: none;
            background: var(--white);
            color: var(--text);
            cursor: pointer;
            border-radius: 25px;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .filter-tab.active {
            background: var(--primary);
            color: var(--white);
        }
        
        .filter-tab:hover:not(.active) {
            background: var(--light);
        }
        
        /* Product Cards */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .product-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        
        .card-header {
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
        }
        
        .card-header.alibaba { background: linear-gradient(135deg, #ED7D31 0%, #F5A623 100%); }
        .card-header.bytedance { background: linear-gradient(135deg, #70AD47 0%, #9DC668 100%); }
        .card-header.global { background: linear-gradient(135deg, #636366 0%, #8E8E93 100%); }
        
        .card-date {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 0.3rem;
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .card-type {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
        
        .card-body {
            padding: 1.2rem;
        }
        
        .card-desc {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.7;
        }
        
        .card-footer {
            padding: 1rem 1.2rem;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .company-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #666;
        }
        
        .company-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .tencent .company-dot { background: #4472C4; }
        .alibaba .company-dot { background: #ED7D31; }
        .bytedance .company-dot { background: #70AD47; }
        .global .company-dot { background: #636366; }
        
        .card-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .card-link:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        footer {
            background: var(--accent);
            color: var(--white);
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .footer-text {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

        let currentLang = 'zh';
        let currentFilter = 'all';
        
        // Language switcher
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                updateContent();
            });
        });
        
        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderProducts();
            });
        });
        
        function updateContent() {
            // Update stats
            document.querySelectorAll('.stat-card').forEach(card => {
                const type = card.classList.contains('tencent') ? 'tencent' : 
                             card.classList.contains('alibaba') ? 'alibaba' :
                             card.classList.contains('bytedance') ? 'bytedance' : 'global';
                
                const titleEl = card.querySelector('.stat-title');
                const descEl = card.querySelector('.stat-desc');
                
                if (translations[currentLang].stats[type]) {
                    titleEl.textContent = translations[currentLang].stats[type].title;
                    descEl.textContent = translations[currentLang].stats[type].desc;
                }
            });
            
            // Update filter tabs
            document.querySelectorAll('.filter-tab').forEach(tab => {
                const filter = tab.dataset.filter;
                tab.textContent = translations[currentLang].filter[filter];
            });
            
            // Update footer
            document.querySelector('[data-i18n="footer.text"]').textContent = 
                translations[currentLang].footer.text;
            
            renderProducts();
        }
        
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = currentFilter === 'all' 
                ? products 
                : products.filter(p => p.company === currentFilter);
            
            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card ${product.company}">
                    <div class="card-header ${product.company}">
                        <div class="card-date">${product.date}</div>
                        <div class="card-title">${product.title[currentLang]}</div>
                        <span class="card-type">${product.type[currentLang]}</span>
                    </div>
                    <div class="card-body">
                        <p class="card-desc">${product.desc[currentLang]}</p>
                    </div>
                    <div class="card-footer">
                        <div class="company-tag">
                            <span class="company-dot"></span>
                            <span>${translations[currentLang].card.company}: ${product.company.toUpperCase()}</span>
                        </div>
                        <a href="https://www.google.com/search?q=${encodeURIComponent(product.title[currentLang])}" target="_blank" rel="noopener" class="card-link">${translations[currentLang].card.readMore} →</a>
                    </div>
                </div>
            `).join('');
        }
        
        // Initial render
        renderProducts();
