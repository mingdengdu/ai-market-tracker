name: Daily Signal Update

on:
  schedule:
    - cron: '0 16 * * *'   # 00:00 Asia/Shanghai = 16:00 UTC
  workflow_dispatch:         # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch signals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd tracker
          python fetch_signals.py
          echo "=== signals.json preview ==="
          python -c "
          import json
          d = json.load(open('data/signals.json'))
          print(f'Total: {d[\"count\"]} signals, updated: {d[\"updated\"]}')
          for s in d['signals'][:5]:
              print(f'  [{s[\"date\"]}] {s[\"title\"][:60]}')
          "

      - name: Inject into HTML dashboards
        run: |
          cd tracker
          python inject_signals.py

      - name: Commit & push
        run: |
          git config user.name  "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add tracker/data/ 04-dashboard/
          
          COUNT=$(python -c "import json; d=json.load(open('tracker/data/signals.json')); print(d['count'])")
          DATE=$(date +%Y-%m-%d)
          
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "🤖 Daily update ${DATE}: ${COUNT} signals fetched" && \
            git push
